# your minecraft server name
name: minecraft-flint

services:
  bedrock-vanilla:
    image: docker.io/pechristakos/minecraft-bedrock:latest
    container_name: ${COMPOSE_PROJECT_NAME}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "19132:19132/udp"
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/bedrock

  bedrock-backup:
    image: docker.io/pechristakos/minecraft-bedrock-backup:latest
    container_name: ${COMPOSE_PROJECT_NAME}-backup
    pull_policy: always
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/bedrock_data:ro
      - ./backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/New_York
      - BACKUP_CRON=0 4 * * *
      - MAX_BACKUPS=10